name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_cmd: zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_cmd: tar
          - os: macos-latest
            rid: osx-x64
            archive_cmd: tar

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: >
          dotnet publish OpenDbConvert/OpenDbConvert.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          --output ./publish

      - name: Archive (Windows)
        if: matrix.archive_cmd == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath OpenDbConvert-${{ github.ref_name }}-${{ matrix.rid }}.zip

      - name: Archive (Linux / macOS)
        if: matrix.archive_cmd == 'tar'
        run: tar -czf OpenDbConvert-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: OpenDbConvert-${{ github.ref_name }}-${{ matrix.rid }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
